<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Risk Prediction - Medisense AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        medisense: {
                            dark: '#0A3323',
                            moss: '#839958',
                            beige: '#F7F4D5',
                            rosy: '#D3968C',
                            midnight: '#105666',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .input-field:focus {
            border-color: #105666;
            box-shadow: 0 0 0 3px rgba(16, 86, 102, 0.1);
        }
    </style>
</head>
<body style="background-color: #F7F4D5;">

    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/dashboard" class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-medisense-dark to-medisense-moss p-2 rounded-xl">
                        <i class="bi bi-heart-pulse-fill text-white text-xl"></i>
                    </div>
                    <div>
                        <span class="text-xl font-bold" style="color: #0A3323;">Medisense AI</span>
                    </div>
                </a>

                <a href="/dashboard" class="flex items-center gap-2 px-4 py-2 rounded-lg font-semibold transition-all duration-300" style="color: #105666;">
                    <i class="bi bi-arrow-left"></i>
                    <span>Back to Dashboard</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="mb-8">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-16 h-16 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, #105666, #839958);">
                    <i class="bi bi-lightning-fill text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold" style="color: #0A3323;">Stroke Risk Assessment</h1>
                    <p class="text-gray-600">Evaluate your stroke risk factors</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8">
            <form id="strokeForm" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Gender</label>
                    <select name="gender" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select Gender</option>
                        <option value="0">Female</option>
                        <option value="1">Male</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Age (years)</label>
                    <input type="number" name="age" required min="1" max="120" step="0.1" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Enter your age">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Hypertension</label>
                    <select name="hypertension" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Heart Disease</label>
                    <select name="heart_disease" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Ever Married</label>
                    <select name="ever_married" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Work Type</label>
                    <select name="work_type" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select Work Type</option>
                        <option value="0">Children</option>
                        <option value="1">Government Job</option>
                        <option value="2">Never Worked</option>
                        <option value="3">Private</option>
                        <option value="4">Self-employed</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Residence Type</label>
                    <select name="Residence_type" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select Residence Type</option>
                        <option value="0">Rural</option>
                        <option value="1">Urban</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Average Glucose Level (mg/dL)</label>
                    <input type="number" name="avg_glucose_level" required min="50" max="300" step="0.01" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Enter average glucose level">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">BMI (Body Mass Index)</label>
                    <input type="number" name="bmi" required min="10" max="100" step="0.1" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Enter your BMI (e.g., 25.5)">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Smoking Status</label>
                    <select name="smoking_status" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select Smoking Status</option>
                        <option value="0">Unknown</option>
                        <option value="1">Formerly Smoked</option>
                        <option value="2">Never Smoked</option>
                        <option value="3">Smokes</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-4 text-white text-lg font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-0.5" style="background: linear-gradient(to right, #105666, #839958);">
                    <span class="flex items-center justify-center gap-2">
                        <span id="btnText">Predict Stroke Risk</span>
                        <i class="bi bi-arrow-right"></i>
                    </span>
                </button>

            </form>
        </div>

        <div id="loadingModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-2xl p-8 max-w-sm mx-4 text-center">
                <div class="w-16 h-16 border-4 rounded-full mx-auto mb-4 animate-spin" style="border-color: #105666; border-top-color: transparent;"></div>
                <h3 class="text-xl font-bold mb-2" style="color: #0A3323;">Analyzing Your Data</h3>
                <p class="text-gray-600">Please wait while our AI processes your information...</p>
            </div>
        </div>

    </div>

    <script>
        document.getElementById('strokeForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loadingModal = document.getElementById('loadingModal');

            submitBtn.disabled = true;
            loadingModal.classList.remove('hidden');

            const formData = new FormData(this);
            const features = [
                parseFloat(formData.get('gender')),
                parseFloat(formData.get('age')),
                parseFloat(formData.get('hypertension')),
                parseFloat(formData.get('heart_disease')),
                parseFloat(formData.get('ever_married')),
                parseFloat(formData.get('work_type')),
                parseFloat(formData.get('Residence_type')),
                parseFloat(formData.get('avg_glucose_level')),
                parseFloat(formData.get('bmi')),
                parseFloat(formData.get('smoking_status'))
            ];

            try {
                const response = await fetch('/predict/stroke', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ features: features })
                });

                const data = await response.json();

                if (response.ok) {
                    sessionStorage.setItem('predictionResult', JSON.stringify(data));
                    window.location.href = '/results/' + data.prediction_id;
                } else {
                    alert('Error: ' + (data.error || 'Prediction failed'));
                    submitBtn.disabled = false;
                    loadingModal.classList.add('hidden');
                }
            } catch (error) {
                alert('An error occurred. Please try again.');
                submitBtn.disabled = false;
                loadingModal.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
