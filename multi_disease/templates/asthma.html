<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asthma Risk Prediction - Medisense AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        medisense: {
                            dark: '#0A3323',
                            moss: '#839958',
                            beige: '#F7F4D5',
                            rosy: '#D3968C',
                            midnight: '#105666',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .input-field:focus {
            border-color: #839958;
            box-shadow: 0 0 0 3px rgba(131, 153, 88, 0.1);
        }
    </style>
</head>
<body style="background-color: #F7F4D5;">

    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/dashboard" class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-medisense-dark to-medisense-moss p-2 rounded-xl">
                        <i class="bi bi-heart-pulse-fill text-white text-xl"></i>
                    </div>
                    <div>
                        <span class="text-xl font-bold" style="color: #0A3323;">Medisense AI</span>
                    </div>
                </a>

                <a href="/dashboard" class="flex items-center gap-2 px-4 py-2 rounded-lg font-semibold transition-all duration-300" style="color: #839958;">
                    <i class="bi bi-arrow-left"></i>
                    <span>Back to Dashboard</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="mb-8">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-16 h-16 rounded-xl flex items-center justify-center" style="background: linear-gradient(135deg, #839958, #105666);">
                    <i class="bi bi-lungs-fill text-white text-3xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold" style="color: #0A3323;">Asthma Risk Assessment</h1>
                    <p class="text-gray-600">Enter your respiratory health information</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8">
            <form id="asthmaForm" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Age (years)</label>
                    <input type="number" name="Age" required min="1" max="120" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Enter your age">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Gender</label>
                    <select name="Gender" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select Gender</option>
                        <option value="0">Female</option>
                        <option value="1">Male</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Ethnicity</label>
                    <select name="Ethnicity" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select Ethnicity</option>
                        <option value="0">Group 0</option>
                        <option value="1">Group 1</option>
                        <option value="2">Group 2</option>
                        <option value="3">Group 3</option>
                        <option value="4">Group 4</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Education Level</label>
                    <select name="EducationLevel" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select Education Level</option>
                        <option value="0">No Formal Education</option>
                        <option value="1">Primary</option>
                        <option value="2">Secondary</option>
                        <option value="3">High School</option>
                        <option value="4">Undergraduate</option>
                        <option value="5">Postgraduate</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">BMI (Body Mass Index)</label>
                    <input type="number" name="BMI" required min="10" max="60" step="0.01" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Enter your BMI">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Smoking</label>
                    <select name="Smoking" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select Smoking Status</option>
                        <option value="0">Never</option>
                        <option value="1">Former</option>
                        <option value="2">Current</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Physical Activity (0-10)</label>
                    <input type="number" name="PhysicalActivity" required min="0" max="10" step="0.01" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Rate physical activity">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Diet Quality (0-10)</label>
                    <input type="number" name="DietQuality" required min="0" max="10" step="0.01" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Rate diet quality">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Sleep Quality (0-10)</label>
                    <input type="number" name="SleepQuality" required min="0" max="10" step="0.01" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Rate sleep quality">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Pollution Exposure (0-10)</label>
                    <input type="number" name="PollutionExposure" required min="0" max="10" step="0.01" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Rate pollution exposure">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Pollen Exposure (0-10)</label>
                    <input type="number" name="PollenExposure" required min="0" max="10" step="0.01" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Rate pollen exposure">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Dust Exposure (0-10)</label>
                    <input type="number" name="DustExposure" required min="0" max="10" step="0.01" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Rate dust exposure">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Pet Allergy</label>
                    <select name="PetAllergy" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Family History of Asthma</label>
                    <select name="FamilyHistoryAsthma" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">History of Allergies</label>
                    <select name="HistoryOfAllergies" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Eczema</label>
                    <select name="Eczema" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Hay Fever</label>
                    <select name="HayFever" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Gastroesophageal Reflux</label>
                    <select name="GastroesophagealReflux" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Lung Function FEV1</label>
                    <input type="number" name="LungFunctionFEV1" required min="0" max="10" step="0.01" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Enter FEV1 value">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Lung Function FVC</label>
                    <input type="number" name="LungFunctionFVC" required min="0" max="10" step="0.01" class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300" placeholder="Enter FVC value">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Wheezing</label>
                    <select name="Wheezing" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Shortness of Breath</label>
                    <select name="ShortnessOfBreath" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Chest Tightness</label>
                    <select name="ChestTightness" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Coughing</label>
                    <select name="Coughing" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Nighttime Symptoms</label>
                    <select name="NighttimeSymptoms" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color: #0A3323;">Exercise Induced</label>
                    <select name="ExerciseInduced" required class="input-field w-full px-4 py-3 border-2 border-gray-300 rounded-xl bg-white focus:outline-none transition-all duration-300">
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-4 text-white text-lg font-semibold rounded-xl shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-0.5" style="background: linear-gradient(to right, #839958, #105666);">
                    <span class="flex items-center justify-center gap-2">
                        <span id="btnText">Predict Asthma Risk</span>
                        <i class="bi bi-arrow-right"></i>
                    </span>
                </button>

            </form>
        </div>

        <div id="loadingModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-2xl p-8 max-w-sm mx-4 text-center">
                <div class="w-16 h-16 border-4 rounded-full mx-auto mb-4 animate-spin" style="border-color: #839958; border-top-color: transparent;"></div>
                <h3 class="text-xl font-bold mb-2" style="color: #0A3323;">Analyzing Your Data</h3>
                <p class="text-gray-600">Please wait while our AI processes your information...</p>
            </div>
        </div>

    </div>

    <script>
        document.getElementById('asthmaForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const loadingModal = document.getElementById('loadingModal');

            submitBtn.disabled = true;
            loadingModal.classList.remove('hidden');

            const formData = new FormData(this);
            const features = [
                parseFloat(formData.get('Age')),
                parseFloat(formData.get('Gender')),
                parseFloat(formData.get('Ethnicity')),
                parseFloat(formData.get('EducationLevel')),
                parseFloat(formData.get('BMI')),
                parseFloat(formData.get('Smoking')),
                parseFloat(formData.get('PhysicalActivity')),
                parseFloat(formData.get('DietQuality')),
                parseFloat(formData.get('SleepQuality')),
                parseFloat(formData.get('PollutionExposure')),
                parseFloat(formData.get('PollenExposure')),
                parseFloat(formData.get('DustExposure')),
                parseFloat(formData.get('PetAllergy')),
                parseFloat(formData.get('FamilyHistoryAsthma')),
                parseFloat(formData.get('HistoryOfAllergies')),
                parseFloat(formData.get('Eczema')),
                parseFloat(formData.get('HayFever')),
                parseFloat(formData.get('GastroesophagealReflux')),
                parseFloat(formData.get('LungFunctionFEV1')),
                parseFloat(formData.get('LungFunctionFVC')),
                parseFloat(formData.get('Wheezing')),
                parseFloat(formData.get('ShortnessOfBreath')),
                parseFloat(formData.get('ChestTightness')),
                parseFloat(formData.get('Coughing')),
                parseFloat(formData.get('NighttimeSymptoms')),
                parseFloat(formData.get('ExerciseInduced'))
            ];

            try {
                const response = await fetch('/predict/asthma', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ features: features })
                });

                const data = await response.json();

                if (response.ok) {
                    sessionStorage.setItem('predictionResult', JSON.stringify(data));
                    window.location.href = '/results/' + data.prediction_id;
                } else {
                    alert('Error: ' + (data.error || 'Prediction failed'));
                    submitBtn.disabled = false;
                    loadingModal.classList.add('hidden');
                }
            } catch (error) {
                alert('An error occurred. Please try again.');
                submitBtn.disabled = false;
                loadingModal.classList.add('hidden');
            }
        });
    </script>

</body>
</html>
